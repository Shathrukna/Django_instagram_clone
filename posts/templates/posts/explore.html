{% extends "base.html" %}

{% block title %}Explore - Instagram{% endblock %}

{% block content %}
<div>
  <div class="explore-grid">
    {% for post in posts %}
    <a href="{% url 'post-detail' post.id %}" class="explore-item">
      <img src="{{ post.image.url }}" alt="{{ post.caption }}" loading="lazy">
      <div class="explore-overlay">
        <span>&#9829; {{ post.likes_count }}</span>
        <span>&#128172; {{ post.comments_count }}</span>
      </div>
    </a>
    {% empty %}
    <div style="grid-column:1/-1;text-align:center;padding:80px 20px;">
      <h4 style="font-weight:400;color:var(--ig-text-secondary);">No posts to explore yet.</h4>
    </div>
    {% endfor %}
  </div>

  {% if posts.has_next %}
  <div style="text-align:center;padding:24px 0 40px;">
    <a href="?page={{ posts.next_page_number }}" style="color:var(--ig-primary);font-weight:600;font-size:14px;">Load more</a>
  </div>
  {% endif %}
</div>
{% endblock %}
