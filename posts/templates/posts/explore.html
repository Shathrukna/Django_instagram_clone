{% extends "base.html" %}

{% block title %}Explore - Instagram{% endblock %}

{% block content %}
<div class="row">
  <div class="col-12">
    <h4 class="mb-4">Explore</h4>
    <div class="row g-2">
      {% for post in posts %}
      <div class="col-4 col-md-3">
        <a href="{% url 'post-detail' post.id %}" class="text-decoration-none">
          <img src="{{ post.image.url }}" alt="{{ post.caption }}" class="img-fluid border" style="width: 100%; height: 250px; object-fit: cover;">
        </a>
      </div>
      {% empty %}
      <div class="col-12 text-center py-5">
        <p class="text-muted">No posts to explore.</p>
      </div>
      {% endfor %}
    </div>

    {% if posts.has_next %}
    <div class="text-center mt-4">
      <a href="?page={{ posts.next_page_number }}" class="btn btn-outline-primary">Load More</a>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
