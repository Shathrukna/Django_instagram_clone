{% extends "base.html" %}

{% block title %}Delete Post - Instagram{% endblock %}

{% block content %}
<div style="max-width:400px;margin:60px auto;padding:0 16px;">
  <div class="post-card p-4 text-center">
    <h4 style="font-weight:400;margin-bottom:8px;">Delete Post?</h4>
    <p style="color:var(--ig-text-secondary);margin-bottom:16px;">This action cannot be undone.</p>
    <img src="{{ post.image.url }}" alt="Post" style="max-height:150px;border-radius:4px;margin-bottom:16px;">
    <form method="POST">
      {% csrf_token %}
      <button type="submit" style="width:100%;height:32px;background:var(--ig-error);color:white;border:none;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;margin-bottom:8px;">Delete</button>
      <a href="{% url 'post-detail' post.id %}" style="display:block;width:100%;height:32px;line-height:32px;border:1px solid var(--ig-border);border-radius:8px;font-weight:600;font-size:14px;text-align:center;color:var(--ig-text);text-decoration:none;">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
