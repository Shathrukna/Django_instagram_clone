{% extends "base.html" %}

{% block title %}Delete Post - Instagram{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow">
      <div class="card-body text-center p-4">
        <h4>Delete Post?</h4>
        <p class="text-muted">This action cannot be undone.</p>
        <img src="{{ post.image.url }}" alt="Post" class="img-fluid mb-3" style="max-height: 200px;">
        <form method="POST">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger w-100">Delete</button>
          <a href="{% url 'post-detail' post.id %}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
