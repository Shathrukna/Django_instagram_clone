{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}{% if editing %}Edit Post{% else %}New Post{% endif %} - Instagram{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow">
      <div class="card-body p-4">
        <h4 class="text-center mb-4">{% if editing %}Edit Post{% else %}Create New Post{% endif %}</h4>
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary w-100 mt-3">
            {% if editing %}Update{% else %}Share{% endif %}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
