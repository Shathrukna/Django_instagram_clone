{% extends "base.html" %}
{% load static %}

{% block title %}{% if editing %}Edit Post{% else %}New Post{% endif %} - Instagram{% endblock %}

{% block content %}
<div style="max-width:500px;margin:30px auto;padding:0 16px;">
  <div class="post-card p-4">
    <h3 style="text-align:center;font-weight:400;margin-bottom:24px;">
      {% if editing %}Edit Post{% else %}Create New Post{% endif %}
    </h3>
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      {% if not editing %}
      <div style="margin-bottom:16px;">
        <label style="font-size:14px;font-weight:600;margin-bottom:4px;display:block;">Image</label>
        <input type="file" name="image" accept="image/*" required style="width:100%;padding:8px;border:1px solid var(--ig-border);border-radius:4px;font-size:14px;">
      </div>
      {% endif %}

      <div style="margin-bottom:16px;">
        <label style="font-size:14px;font-weight:600;margin-bottom:4px;display:block;">Caption</label>
        <textarea name="caption" rows="4" style="width:100%;border:1px solid var(--ig-border);border-radius:4px;padding:8px;font-size:14px;resize:vertical;background:var(--ig-bg);" placeholder="Write a caption...">{{ form.caption.value|default:'' }}</textarea>
      </div>

      <button type="submit" style="width:100%;height:32px;background:var(--ig-primary);color:white;border:none;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;">
        {% if editing %}Update{% else %}Share{% endif %}
      </button>
    </form>
  </div>
</div>
{% endblock %}
