{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Register - Instagram{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <h2 class="text-center mb-4 logo-font" style="font-size: 2.5rem;">
          Instagram
        </h2>
        <p class="text-muted text-center mb-4">Sign up to see photos from your friends.</p>
        <form method="POST">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary w-100 mt-3">Sign Up</button>
        </form>
        <p class="text-center mt-3">
          Already have an account? <a href="{% url 'login' %}">Log in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
