{% extends "base.html" %}

{% block title %}Email Sent - Instagram{% endblock %}

{% block content %}
<div class="auth-container" style="justify-content:center;">
  <div class="auth-form-col">
    <div class="auth-card">
      <h1>Instagram</h1>
      <p class="auth-subtitle">Email Sent</p>
      <p style="font-size:14px;color:var(--ig-text-secondary);">Check your email for a link to reset your password. If it doesn't appear within a few minutes, check your spam folder.</p>
    </div>
    <div class="auth-redirect">
      <a href="{% url 'login' %}">Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
