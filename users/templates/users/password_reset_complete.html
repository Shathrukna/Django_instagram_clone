{% extends "base.html" %}

{% block title %}Password Reset - Instagram{% endblock %}

{% block content %}
<div class="auth-container" style="justify-content:center;">
  <div class="auth-form-col">
    <div class="auth-card">
      <h1>Instagram</h1>
      <p class="auth-subtitle">Password reset complete</p>
      <p style="font-size:14px;color:var(--ig-text-secondary);margin-bottom:16px;">Your password has been set. You may go ahead and log in now.</p>
      <a href="{% url 'login' %}" style="display:inline-block;height:32px;line-height:32px;padding:0 20px;background:var(--ig-primary);color:white;border-radius:8px;font-weight:600;font-size:14px;text-decoration:none;">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
