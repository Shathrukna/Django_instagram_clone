<nav class="ig-navbar">
  <div class="nav-inner">
    <a href="{% url 'feed' %}" class="nav-logo">Instagram</a>

    <div class="nav-search">
      <form action="{% url 'search-users' %}" method="GET" style="margin:0;">
        <input type="text" name="q" placeholder="Search" aria-label="Search">
      </form>
    </div>

    <div class="nav-icons">
      <a href="{% url 'feed' %}" title="Home"><i class="bi bi-house-door-fill"></i></a>
      <a href="{% url 'inbox' %}" title="Messages"><i class="bi bi-send"></i></a>
      <a href="{% url 'create-post' %}" title="New Post"><i class="bi bi-plus-square"></i></a>
      <a href="{% url 'explore' %}" title="Explore"><i class="bi bi-compass"></i></a>
      <a href="{% url 'notifications' %}" title="Notifications" style="position:relative;">
        <i class="bi bi-heart"></i>
        {% with unread_count=request.user.received_notifications.all.count %}
          {% if unread_count > 0 %}
            <span class="notif-dot"></span>
          {% endif %}
        {% endwith %}
      </a>
      <div class="nav-avatar-wrap" style="position:relative;" id="navProfileDropdown">
        <img src="{{ user.profile.image.url }}" alt="{{ user.username }}" class="nav-avatar" id="navAvatar">
        <div class="ig-dropdown" id="profileDropdown" style="top:32px;right:0;left:auto;">
          <a href="{% url 'profile' %}"><i class="bi bi-person me-2"></i>Profile</a>
          <a href="{% url 'edit-profile' %}"><i class="bi bi-gear me-2"></i>Settings</a>
          <a href="{% url 'stories' %}"><i class="bi bi-bookmark me-2"></i>Stories</a>
          <a href="{% url 'reels-feed' %}"><i class="bi bi-film me-2"></i>Reels</a>
          <div class="dropdown-divider"></div>
          <a href="{% url 'logout' %}" class="text-danger"><i class="bi bi-box-arrow-right me-2"></i>Log Out</a>
        </div>
      </div>
    </div>
  </div>
</nav>

<nav class="ig-bottom-nav">
  <a href="{% url 'feed' %}"><i class="bi bi-house-door-fill"></i></a>
  <a href="{% url 'explore' %}"><i class="bi bi-compass"></i></a>
  <a href="{% url 'create-post' %}"><i class="bi bi-plus-square"></i></a>
  <a href="{% url 'notifications' %}"><i class="bi bi-heart"></i></a>
  <a href="{% url 'profile' %}">
    <img src="{{ user.profile.image.url }}" alt="{{ user.username }}" class="nav-avatar-sm">
  </a>
</nav>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var avatar = document.getElementById('navAvatar');
  var dropdown = document.getElementById('profileDropdown');
  if (avatar && dropdown) {
    avatar.addEventListener('click', function(e) {
      e.stopPropagation();
      dropdown.classList.toggle('show');
    });
    document.addEventListener('click', function() {
      dropdown.classList.remove('show');
    });
    dropdown.addEventListener('click', function(e) {
      e.stopPropagation();
    });
  }
});
</script>
