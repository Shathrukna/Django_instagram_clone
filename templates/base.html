<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{% block title %}Instagram{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="icon" type="image/png" href="https://static.cdninstagram.com/static/ib.jpg">
</head>
<body>
  {% if user.is_authenticated %}
    {% include "navbar.html" %}
  {% endif %}

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show text-center mb-0 rounded-0" role="alert" style="position: fixed; top: 60px; left: 0; right: 0; z-index: 999; border-radius: 0; font-size: 14px;">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" style="font-size: 12px;"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% if user.is_authenticated %}
    <div class="ig-container">
  {% else %}
    <div class="auth-page">
  {% endif %}
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
